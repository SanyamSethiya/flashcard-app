<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recall — Spaced Repetition{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="topnav">
        <a href="{{ url_for('home') }}" class="brand">
            <span class="brand-mark">◆</span> Recall
        </a>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">Dashboard he kya</a>
            <a href="{{ url_for('review') }}">Review</a>
            <a href="{{ url_for('add_card') }}" class="nav-cta">+ New card</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% if request.args.get('toast') %}
    <div class="toast" id="appToast">{{ request.args.get('toast') }}</div>
    {% endif %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
