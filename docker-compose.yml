version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: recall_web
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql_db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      mysql_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - recall_network

  mysql_db:
    image: mysql:8.0
    container_name: recall_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - recall_network

volumes:
  mysql_data:

networks:
  recall_network:
    driver: bridge
